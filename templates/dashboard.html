<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="300">
<title>人数监测仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  :root {
    --bg: #f5f5f5; --card-bg: #fff; --text: #333; --sub: #666;
    --border: #e0e0e0; --warn: #f59e0b; --crit: #ef4444; --ok: #22c55e;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
         background: var(--bg); color: var(--text); padding: 20px; }
  header { display: flex; justify-content: space-between; align-items: center;
           margin-bottom: 20px; }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  .status { display: flex; align-items: center; gap: 8px; font-size: 0.875rem; }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .status-dot.ok { background: var(--ok); }
  .status-dot.warn { background: var(--warn); }
  .status-dot.crit { background: var(--crit); }
  .nav { display: flex; gap: 8px; margin-bottom: 20px; }
  .nav button { padding: 8px 20px; border: 1px solid var(--border);
    background: var(--card-bg); border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
  .nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: var(--card-bg); border: 1px solid var(--border);
          border-radius: 8px; padding: 20px; }
  .card h2 { font-size: 1rem; font-weight: 500; color: var(--sub); margin-bottom: 12px; }
  .big-number { font-size: 3rem; font-weight: 700; line-height: 1.2; }
  .big-number .time { font-size: 0.75rem; font-weight: 400; color: var(--sub); display: block; }
  .chart-container { position: relative; height: 260px; }
  .full-width { grid-column: 1 / -1; }
  .hidden { display: none; }
  .warning-banner { background: #fef3c7; border: 1px solid var(--warn);
    border-radius: 4px; padding: 10px 16px; margin-bottom: 16px; font-size: 0.875rem; }

  /* settings */
  .schedule-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
  .schedule-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    background: #f9fafb; border-radius: 6px; font-size: 0.9rem; }
  .schedule-row.disabled { opacity: 0.4; }
  .schedule-row .time { font-weight: 600; font-size: 1.1rem; }
  .schedule-row .dow { color: var(--sub); font-size: 0.8rem; }
  .schedule-row button { padding: 4px 10px; border: 1px solid var(--border);
    background: #fff; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
  .schedule-row button.del { color: var(--crit); border-color: var(--crit); }
  .add-row { display: flex; gap: 8px; align-items: center; }
  .add-row input { padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.875rem; width: 80px; }
  .add-row select { padding: 6px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 0.8rem; }
  .add-row button { padding: 6px 14px; background: var(--accent); color: #fff;
    border: none; border-radius: 4px; cursor: pointer; font-size: 0.875rem; }

  /* modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #fff; border-radius: 10px; max-width: 90vw; max-height: 90vh;
    overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal img { display: block; max-width: 100%; max-height: 70vh; }
  .modal .info { padding: 14px 20px; display: flex; justify-content: space-between;
    align-items: center; font-size: 0.9rem; }
  .modal .info .count { font-size: 1.4rem; font-weight: 700; }
  .modal .close { position: absolute; top: 16px; right: 24px; font-size: 1.8rem;
    color: #fff; cursor: pointer; z-index: 1001; line-height: 1; }
</style>
</head>
<body>
<header>
  <h1>📊 人数监测仪表盘</h1>
  <div class="status">
    <span>系统:</span>
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">—</span>
  </div>
</header>

<div class="nav">
  <button class="active" onclick="showTab('dashboard')">📈 仪表盘</button>
  <button onclick="showTab('settings')">⚙️ 时间设置</button>
</div>

<div id="warning-container"></div>

<!-- DASHBOARD TAB -->
<div id="tab-dashboard">
  <div class="grid">
    <div class="card">
      <h2>当前人数</h2>
      <div class="big-number" id="current-count">—</div>
    </div>
    <div class="card">
      <h2>今日快照</h2>
      <div style="font-size:0.875rem;color:var(--sub);line-height:1.8" id="today-summary">加载中...</div>
    </div>
  </div>
  <div class="grid">
    <div class="card full-width">
      <h2>过去7天（散点: 每个时间点一次快照）</h2>
      <div class="chart-container"><canvas id="chart-7d"></canvas></div>
    </div>
  </div>
  <div class="card full-width">
    <h2>数据导出</h2>
    <div style="display:flex;gap:12px;align-items:center;margin-top:8px">
      <label>起始: <input type="date" id="export-from"></label>
      <label>结束: <input type="date" id="export-to"></label>
      <button onclick="downloadCSV()" style="padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer">下载 CSV</button>
      <span id="export-msg" style="font-size:0.8rem;color:var(--sub)"></span>
    </div>
  </div>
</div>

<!-- SETTINGS TAB -->
<div id="tab-settings" class="hidden">
  <div class="card full-width">
    <h2>快照时间点设置</h2>
    <p style="font-size:0.8rem;color:var(--sub);margin-bottom:12px">
      设置每天自动快照的时间点。默认: 工作日(周一至周五)上午9:00、11:00、下午14:00、16:00。
    </p>
    <div class="schedule-list" id="schedule-list">加载中...</div>
    <div class="add-row">
      <input type="time" id="new-time" value="09:00" step="60">
      <select id="new-dow">
        <option value="">每天</option>
        <option value="1,2,3,4,5" selected>工作日 (周一至周五)</option>
        <option value="1">周一</option><option value="2">周二</option>
        <option value="3">周三</option><option value="4">周四</option>
        <option value="5">周五</option><option value="6">周六</option>
        <option value="0">周日</option>
      </select>
      <button onclick="addTime()">+ 添加</button>
    </div>
    <p style="font-size:0.75rem;color:var(--sub);margin-top:8px" id="schedule-note"></p>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="snap-modal" onclick="closeModal(event)">
  <span class="close" onclick="closeModal()">&times;</span>
  <div class="modal" onclick="event.stopPropagation()">
    <img id="snap-img" src="" alt="快照预览">
    <div class="info">
      <span id="snap-ts"></span>
      <span class="count" id="snap-count"></span>
    </div>
  </div>
</div>

<script>
const API = '/api';
let chart7d = null;

function showTab(name) {
  document.querySelectorAll('.nav button').forEach((b,i) => {
    b.classList.toggle('active', i === (name === 'dashboard' ? 0 : 1));
  });
  document.getElementById('tab-dashboard').classList.toggle('hidden', name !== 'dashboard');
  document.getElementById('tab-settings').classList.toggle('hidden', name !== 'settings');
  if (name === 'settings') loadSchedule();
}

// ---- health ----
async function checkHealth() {
  try {
    const r = await fetch(API + '/health'); const d = await r.json();
    const dot = document.getElementById('status-dot');
    dot.className = 'status-dot ' + (d.status === 'ok' ? 'ok' : d.status === 'warning' ? 'warn' : 'crit');
    document.getElementById('status-text').textContent = d.status === 'ok' ? '正常' : d.warnings.join('; ');
    const wc = document.getElementById('warning-container');
    wc.innerHTML = d.warnings.length > 0
      ? d.warnings.map(w => `<div class="warning-banner">⚠ ${w}</div>`).join('') : '';
  } catch(e) {}
}

// ---- latest count ----
async function loadLatest() {
  try {
    const r = await fetch(API + '/counts/latest?camera_id=1'); const d = await r.json();
    const el = document.getElementById('current-count');
    if (d.count === null) {
      el.innerHTML = '<span style="font-size:1.2rem;color:var(--sub)">等待数据...</span>';
    } else {
      el.innerHTML = `${d.count}<span class="time">${new Date(d.recorded_at).toLocaleString('zh-CN')}</span>`;
    }
  } catch(e) {}
}

// ---- scatter chart (7 days, raw data points) ----
let chartRawData = [];  // store raw data for click handler

async function loadChart() {
  try {
    const to = new Date().toISOString();
    const from = new Date(Date.now() - 7*24*60*60*1000).toISOString();
    const r = await fetch(API + `/counts/timeseries?camera_id=1&from=${from}&to=${to}&bucket=raw`);
    const d = await r.json();

    // Only show points that have associated snapshot images
    chartRawData = d.data.filter(p => p.snapshot_path);

    // Map to scatter points with snapshot_path as custom data
    const points = chartRawData.map(p => ({
      x: new Date(p.timestamp).getTime(),
      y: p.person_count,
      snap: p.snapshot_path  // stored in point for click handler
    }));

    if (chart7d) chart7d.destroy();
    chart7d = new Chart(document.getElementById('chart-7d'), {
      type: 'scatter',
      data: {
        datasets: [{
          label: '人数',
          data: points,
          backgroundColor: '#3b82f6',
          pointRadius: 6,
          pointHoverRadius: 8,
          pointHitRadius: 12,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: (e, elements, chart) => {
          if (elements.length > 0) {
            const idx = elements[0].index;
            const pt = chart.data.datasets[0].data[idx];
            openModal(pt.snap, pt.x, pt.y);
          }
        },
        scales: {
          x: {
            type: 'time',
            time: { unit: 'day', tooltipFormat: 'MM/dd HH:mm' },
            title: { display: false }
          },
          y: { beginAtZero: true, title: { display: true, text: '人数' },
               ticks: { stepSize: 1 } }
        },
        plugins: { legend: { display: false } }
      }
    });

    // summary
    if (d.data.length > 0) {
      const counts = d.data.map(p => p.person_count).filter(c => c !== null);
      const max = Math.max(...counts, 0);
      const avg = counts.reduce((a,b)=>a+b,0) / counts.length || 0;
      document.getElementById('today-summary').innerHTML =
        `7天快照: <strong>${d.data.length}</strong> 次<br>` +
        `峰值: <strong>${max}</strong> 人<br>` +
        `均值: <strong>${avg.toFixed(1)}</strong> 人`;
    }
  } catch(e) { console.error(e); }
}

// ---- CSV export ----
function downloadCSV() {
  const from = document.getElementById('export-from').value;
  const to = document.getElementById('export-to').value;
  let url = API + '/export/csv?camera_id=1';
  if (from) url += '&from=' + from + 'T00:00:00+08:00';
  if (to) url += '&to=' + to + 'T23:59:59+08:00';
  document.getElementById('export-msg').textContent = '下载中...';
  window.location.href = url;
  setTimeout(() => { document.getElementById('export-msg').textContent = '完成。'; }, 1000);
}

// ---- schedule CRUD ----
async function loadSchedule() {
  const r = await fetch(API + '/schedule?camera_id=1');
  const d = await r.json();
  const list = document.getElementById('schedule-list');
  if (d.schedule.length === 0) {
    list.innerHTML = '<div style="color:var(--sub)">暂无时间点，请添加。</div>';
    return;
  }
  list.innerHTML = d.schedule.map(s => {
    const dowLabel = s.day_of_week === '1,2,3,4,5' ? '工作日' :
                     s.day_of_week === '' ? '每天' : s.day_of_week;
    return `<div class="schedule-row ${s.enabled ? '' : 'disabled'}">
      <span class="time">${s.time_of_day}</span>
      <span class="dow">${dowLabel}</span>
      <button onclick="toggleTime(${s.id}, ${s.enabled})">${s.enabled ? '禁用' : '启用'}</button>
      <button class="del" onclick="deleteTime(${s.id})">删除</button>
    </div>`;
  }).join('');
  document.getElementById('schedule-note').textContent =
    `共 ${d.schedule.length} 个时间点。修改后自动生效。`;
}

async function addTime() {
  const time = document.getElementById('new-time').value;
  const dow = document.getElementById('new-dow').value;
  if (!time) return;
  await fetch(API + '/schedule', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({camera_id: 1, time_of_day: time, day_of_week: dow})
  });
  loadSchedule();
}

async function toggleTime(id, currentlyEnabled) {
  await fetch(API + '/schedule/' + id, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: currentlyEnabled ? 0 : 1})
  });
  loadSchedule();
}

async function deleteTime(id) {
  if (!confirm('删除此时间点？')) return;
  await fetch(API + '/schedule/' + id, { method: 'DELETE' });
  loadSchedule();
}

// ---- modal ----
function openModal(snapshotPath, ts, count) {
  if (!snapshotPath) {
    alert('此数据点没有关联快照图片。');
    return;
  }
  const filename = snapshotPath.replace(/\\/g, '/').split('/').pop();
  document.getElementById('snap-img').src = '/snapshots/' + filename;
  document.getElementById('snap-ts').textContent = new Date(ts).toLocaleString('zh-CN');
  document.getElementById('snap-count').textContent = count + ' 人';
  document.getElementById('snap-modal').classList.add('active');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('snap-modal')) return;
  document.getElementById('snap-modal').classList.remove('active');
}

// ESC key close
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('snap-modal').classList.remove('active');
});

// ---- init ----
checkHealth();
loadLatest();
loadChart();
setInterval(() => { checkHealth(); loadLatest(); }, 60_000);
setInterval(loadChart, 300_000);
</script>
</body>
</html>
